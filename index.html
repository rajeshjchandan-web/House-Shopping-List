<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>House Shopping List V4.0</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#182230;--muted:#667085;--brand:#168a5a;--brand2:#0f6f48;--gold:#f5b700;--red:#d92d20;--line:#e4e7ec;--soft:#ecfdf3;--blue:#eff8ff;--shadow:0 10px 28px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:82px}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:var(--ink);min-height:46px}button{border:0;border-radius:14px;padding:12px 14px;background:var(--brand);color:white;font-weight:800;cursor:pointer;min-height:46px}button.secondary{background:#eef2f6;color:#263445}button.gold{background:var(--gold);color:#201600}button.red{background:var(--red)}button.small{min-height:auto;padding:8px 10px;border-radius:10px;font-size:12px}.wrap{max-width:1120px;margin:auto;padding:12px}.top{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,var(--brand2),#25ad73);color:white;padding:calc(12px + env(safe-area-inset-top)) 14px 14px;border-radius:0 0 22px 22px;box-shadow:var(--shadow)}.top h1{font-size:20px;margin:0}.between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.muted{color:var(--muted);font-size:13px}.smalltxt{font-size:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}.card h2,.card h3{margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:var(--soft);border:1px solid #d1fadf;border-radius:18px;padding:12px}.stat b{font-size:20px}.form4{display:grid;grid-template-columns:1.4fr 1fr .7fr .8fr;gap:8px}.form3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.form2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.tabs{display:flex;gap:8px;overflow:auto;padding:8px 0}.pill,.tab{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;background:#eef2f6;color:#344054;font-size:12px;font-weight:800;white-space:nowrap}.tab{border:1px solid var(--line);cursor:pointer}.tab.active{background:var(--brand);color:#fff}.list{display:grid;gap:9px}.item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.item.done{background:#f2f4f7;opacity:.72}.pill.green{background:#dcfae6;color:#05603a}.pill.gold{background:#fef0c7;color:#93370d}.pill.red{background:#fee4e2;color:#912018}.pill.blue{background:#d1e9ff;color:#175cd3}.check{width:28px;min-height:28px;height:28px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}.right{text-align:right!important}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#eafff2,#f7fbff)}.loginbox{width:min(460px,100%);background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:22px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:6px env(safe-area-inset-right) calc(6px + env(safe-area-inset-bottom)) env(safe-area-inset-left);z-index:20}.nav button{background:transparent;color:#667085;border-radius:12px;padding:7px 2px;font-size:10.5px;min-height:44px}.nav button.active{background:#e9f7ef;color:var(--brand)}.vendorgrid{display:grid;grid-template-columns:1.2fr .75fr .75fr .8fr;gap:8px;align-items:end}.amountBox{background:var(--blue);border:1px solid #b2ddff;border-radius:14px;padding:11px;font-weight:900}.hide{display:none!important}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.form4,.form3,.form2,.vendorgrid{grid-template-columns:1fr}.card{border-radius:18px}.top{border-radius:0 0 18px 18px}.table{display:block;overflow:auto}.top h1{font-size:18px}}
</style>
</head>
<body><div id="app"></div>
<script>
const APP_VERSION='V4.0 Simple Useful Build - working vendor rate entry - 2026-06-08';
const DB_KEY='hsl_v40_simple_free';
const units=['Kg','Gm','Ltr','Ml','Pcs','Dozen','Packet','Box','Bag','Sack','Bundle','Bunch','Tray','Carton','Roll','Bottle','Tin','Jar'];
const defaultUsers=[
 {u:'admin',p:'1234',role:'Admin',name:'Admin'},
 {u:'ashok',p:'1234',role:'Shopper',name:'Ashok'},
 {u:'phionah',p:'1234',role:'Cook',name:'Phionah'},
 {u:'vendor',p:'1234',role:'Vendor',name:'Vegetable Vendor'},
 {u:'family1',p:'1234',role:'Family',name:'Family A'},
 {u:'family2',p:'1234',role:'Family',name:'Family B'},
 {u:'family3',p:'1234',role:'Family',name:'Family C'}
];
function seed(){return{requests:[],bills:[],cash:[],logs:[],settings:{mainShopper:'Ashok',shoppers:['Ashok'],categories:['Vegetables','Fruits','Flour & Grains','Pulses & Beans','Dairy','Spices','Oils','Household','Snacks','Tea & Beverages','Other'],extraUsers:[],ekadashiName:'Next Swaminarayan Ekadashi',ekadashiDate:'',cycleDays:14}}}
function db(){let raw=localStorage.getItem(DB_KEY); if(!raw){localStorage.setItem(DB_KEY,JSON.stringify(seed()))} let d=JSON.parse(localStorage.getItem(DB_KEY)); let s=seed(); d.requests=d.requests||[]; d.bills=d.bills||[]; d.cash=d.cash||[]; d.logs=d.logs||[]; d.settings={...s.settings,...(d.settings||{})}; return d}
function save(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
function allUsers(){return [...defaultUsers,...(db().settings.extraUsers||[])]}
function cats(){return db().settings.categories||[]}
function requesters(){let out=['Common Kitchen','Family A','Family B','Family C']; allUsers().filter(u=>u.role==='Family').forEach(u=>{if(!out.includes(u.name))out.push(u.name)}); db().requests.forEach(r=>{if(r.source&&!out.includes(r.source))out.push(r.source)}); return out}
function canManage(){return session && ['Admin','Shopper'].includes(session.role)}
function canRequest(){return session && session.role!=='Vendor'}
function money(n){return 'UGX '+Number(n||0).toLocaleString()}
function now(){return new Date().toLocaleString()}
function id(){return Date.now()+Math.random()}
function el(x){return document.getElementById(x)}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
let session=JSON.parse(localStorage.getItem('hsl_session_v40')||'null');
let tab='home', filterCat='All', filterRequester='All';
function addLog(action){let d=db(); d.logs.unshift({id:id(),user:session?session.name:'System',action,at:now()}); save(d)}
function login(){let opts=allUsers().map(u=>`<option value="${esc(u.u)}">${esc(u.name)} (${esc(u.role)})</option>`).join(''); app.innerHTML=`<div class="login"><div class="loginbox"><div style="font-size:42px">🛒</div><h2>House Shopping List</h2><p class="muted">Requests • Shopping • Bills • Cash Book</p><p class="pill green">${APP_VERSION}</p><label>User</label><select id="lu">${opts}</select><br><br><label>Password</label><input id="lp" type="password" value="1234"><br><br><button onclick="doLogin()">Login</button><p class="muted smalltxt">Default password: 1234</p></div></div>`}
function doLogin(){let u=allUsers().find(x=>x.u===el('lu').value && x.p===el('lp').value); if(!u)return alert('Wrong login'); session=u; localStorage.setItem('hsl_session_v40',JSON.stringify(session)); addLog('logged in'); render()}
function logout(){addLog('logged out'); session=null; localStorage.removeItem('hsl_session_v40'); render()}
function render(){session?shell():login()}
function shell(){let tabs=['home','request','shopping','vendor','cash','logs']; app.innerHTML=`<div class="top"><div class="between"><div><h1>🛒 House Shopping List</h1><div class="smalltxt">${esc(session.name)} • ${esc(session.role)} • ${APP_VERSION}</div></div><button class="secondary small" onclick="logout()">Logout</button></div></div><div class="wrap" id="main"></div><div class="nav">${tabs.map(t=>`<button class="${tab===t?'active':''}" onclick="tab='${t}';draw()">${navName(t)}</button>`).join('')}</div>`; draw()}
function navName(t){return{home:'🏠 Home',request:'📝 Request',shopping:'🛒 Shop',vendor:'🥬 Vendor',cash:'💰 Cash',logs:'📜 Logs'}[t]}
function draw(){if(tab==='home')home(); if(tab==='request')requestPage(); if(tab==='shopping')shoppingPage(); if(tab==='vendor')vendorPage(); if(tab==='cash')cashPage(); if(tab==='logs')logsPage(); document.querySelectorAll('.nav button').forEach((b,i)=>b.classList.toggle('active',['home','request','shopping','vendor','cash','logs'][i]===tab))}
function nextSunday(){let d=new Date(); let diff=(7-d.getDay())%7; if(diff===0)diff=14; d.setDate(d.getDate()+diff); return d.toLocaleDateString()}
function home(){let d=db(); let pending=d.requests.filter(r=>!r.purchased).length, done=d.requests.filter(r=>r.purchased).length, bills=d.bills.filter(b=>!b.paid).reduce((a,b)=>a+b.total,0), cash=shopperCash(); main.innerHTML=`<div class="card"><h2>Dashboard</h2><div class="grid"><div class="stat"><span>Pending Items</span><br><b>${pending}</b></div><div class="stat"><span>Purchased</span><br><b>${done}</b></div><div class="stat"><span>Pending Bills</span><br><b>${money(bills)}</b></div><div class="stat"><span>Cash with Shopper</span><br><b>${money(cash)}</b></div></div></div><div class="card"><h3>Useful Reminders</h3><div class="row"><span class="pill blue">Shopping: every 2nd Sunday</span><span class="pill gold">Reimbursement: next Saturday</span><span class="pill green">Next Sunday: ${nextSunday()}</span></div><p class="muted">Cashier deals only with the main shopper: <b>${esc(d.settings.mainShopper)}</b>.</p></div>${setupCard()}${balanceCard()}`}
function filters(){return `<div class="form2"><select onchange="filterRequester=this.value;draw()"><option>All</option>${requesters().map(r=>`<option ${filterRequester===r?'selected':''}>${esc(r)}</option>`).join('')}</select><select onchange="filterCat=this.value;draw()"><option>All</option>${cats().map(c=>`<option ${filterCat===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div><br>`}
function allowedSources(){if(session.role==='Cook')return ['Common Kitchen']; if(session.role==='Family')return [session.name]; return requesters()}
function requestPage(){let form=''; if(canRequest()){form=`<div class="card"><h3>Add Request</h3><p class="muted">Type any vegetarian item. No fixed item list is loaded.</p><div class="form4"><input id="rqItem" placeholder="Item name"><select id="rqCat">${cats().map(c=>`<option>${esc(c)}</option>`).join('')}</select><input id="rqQty" type="number" min="0" step="0.01" placeholder="Qty"><select id="rqUnit">${units.map(u=>`<option>${u}</option>`).join('')}</select></div><br><div class="form3"><select id="rqSource">${allowedSources().map(r=>`<option>${esc(r)}</option>`).join('')}</select><select id="rqUrgent"><option value="No">Normal</option><option value="Yes">Urgent</option></select><button onclick="addReq()">Submit Request</button></div></div>`} main.innerHTML=`${form}<div class="card"><h3>Requests</h3>${filters()}<div class="list">${requestList(false)}</div></div>`}
function addReq(){let item=el('rqItem').value.trim(), qty=Number(el('rqQty').value); if(!item||!qty)return alert('Enter item and quantity'); let d=db(); d.requests.unshift({id:id(),item,cat:el('rqCat').value,qty,unit:el('rqUnit').value,source:el('rqSource').value,urgent:el('rqUrgent').value==='Yes',purchased:false,unavailable:false,createdBy:session.name,at:now()}); save(d); addLog(`added request: ${item} ${qty} ${el('rqUnit').value} for ${el('rqSource').value}`); requestPage()}
function viewReqs(){let r=db().requests; if(session.role==='Family')r=r.filter(x=>x.source===session.name); if(session.role==='Vendor')r=r.filter(x=>['Vegetables','Fruits'].includes(x.cat)); if(filterRequester!=='All')r=r.filter(x=>x.source===filterRequester); if(filterCat!=='All')r=r.filter(x=>x.cat===filterCat); return r}
function requestList(shopMode){let r=viewReqs(); if(!r.length)return '<p class="muted">No items found.</p>'; return r.map(x=>`<div class="item ${x.purchased?'done':''}"><div class="between"><div><b>${x.urgent?'🚨 ':''}${esc(x.item)}</b> <span class="pill">${x.qty} ${esc(x.unit)}</span> ${x.unavailable?'<span class="pill red">Not Available</span>':''}<br><span class="muted">${esc(x.cat)} • ${esc(x.source)} • by ${esc(x.createdBy)} • ${esc(x.at)}</span></div>${shopMode&&canManage()?`<input class="check" type="checkbox" ${x.purchased?'checked':''} onchange="toggleBuy(${x.id},this.checked)">`:''}</div>${shopMode&&canManage()?`<div class="row" style="margin-top:8px"><button class="secondary small" onclick="markUnavailable(${x.id})">Not Available</button><button class="red small" onclick="deleteReq(${x.id})">Delete</button></div>`:''}</div>`).join('')}
function shoppingPage(){if(!canManage()){main.innerHTML='<div class="card"><h3>Shopping</h3><p class="muted">Only main shopper/admin can use shopping mode.</p></div>';return} main.innerHTML=`<div class="card"><h3>Shopping Checklist</h3><p class="muted">Select requester to shop separately for Common Kitchen, Family A, Family B, or Family C.</p>${filters()}<div class="list">${requestList(true)}</div></div>`}
function toggleBuy(rid,val){let d=db(), r=d.requests.find(x=>x.id==rid); if(r){r.purchased=val; if(val)r.unavailable=false; save(d); addLog(`${val?'purchased':'unchecked'}: ${r.item}`);}}
function markUnavailable(rid){let d=db(), r=d.requests.find(x=>x.id==rid); if(r){r.unavailable=!r.unavailable; r.purchased=false; save(d); addLog(`${r.unavailable?'marked not available':'removed not available'}: ${r.item}`); shoppingPage()}}
function deleteReq(rid){if(!confirm('Delete this item?'))return; let d=db(), r=d.requests.find(x=>x.id==rid); d.requests=d.requests.filter(x=>x.id!=rid); save(d); addLog('deleted request: '+(r?r.item:rid)); draw()}
function vendorItems(){return db().requests.filter(x=>['Vegetables','Fruits'].includes(x.cat)&&!x.unavailable)}
function vendorPage(){let items=vendorItems(); let can=session.role==='Vendor'||canManage(); if(!can){main.innerHTML='<div class="card"><h3>Vendor</h3><p class="muted">Vendor/admin/shopper only.</p></div>';return} main.innerHTML=`<div class="card"><h3>Vendor Rate Entry</h3><p class="muted">Vendor can type rate here. Amount calculates automatically. Use Tab/Next on phone to move field.</p>${items.length?items.map(vendorCard).join(''):'<p class="muted">No vegetable/fruit orders yet.</p>'}${items.length?'<br><button onclick="generateBill()">Generate Bill</button>':''}</div>${billsCard()}`}
function vendorCard(x){return `<div class="item"><div class="between"><div><b>${esc(x.item)}</b><br><span class="muted">Requested: ${x.qty} ${esc(x.unit)} • For: ${esc(x.source)}</span></div><span class="pill blue">${esc(x.cat)}</span></div><div class="vendorgrid" style="margin-top:10px"><div><label class="muted smalltxt">Qty Given</label><input id="vgiven_${x.id}" inputmode="decimal" type="number" min="0" step="0.01" value="${x.qty}" oninput="calcLine(${x.id})"></div><div><label class="muted smalltxt">Unit</label><select id="vunit_${x.id}">${units.map(u=>`<option ${u===x.unit?'selected':''}>${u}</option>`).join('')}</select></div><div><label class="muted smalltxt">Rate / Unit</label><input id="vrate_${x.id}" inputmode="numeric" type="number" min="0" step="1" placeholder="Type rate" oninput="calcLine(${x.id})"></div><div><label class="muted smalltxt">Amount</label><div class="amountBox" id="vamt_${x.id}">${money(0)}</div></div></div></div>`}
function calcLine(rid){let q=Number((el('vgiven_'+rid)||{}).value||0), rate=Number((el('vrate_'+rid)||{}).value||0); let box=el('vamt_'+rid); if(box)box.textContent=money(q*rate)}
function generateBill(){let rows=vendorItems().map(x=>{let q=Number((el('vgiven_'+x.id)||{}).value||0), rate=Number((el('vrate_'+x.id)||{}).value||0); return{requestId:x.id,item:x.item,source:x.source,qty:q,unit:(el('vunit_'+x.id)||{}).value||x.unit,rate,amount:q*rate}}).filter(x=>x.qty>0&&x.rate>0); if(!rows.length)return alert('Please type rate for at least one item.'); let total=rows.reduce((a,b)=>a+b.amount,0); let d=db(); d.bills.unshift({id:id(),vendor:session.role==='Vendor'?session.name:'Vegetable Vendor',items:rows,total,paid:false,at:now()}); save(d); addLog('vendor bill generated: '+money(total)); vendorPage()}
function billsCard(){let d=db(); return `<div class="card"><h3>Bills & Payments</h3>${d.bills.length?d.bills.map(b=>`<div class="item"><div class="between"><div><b>${esc(b.vendor)}</b><br><span class="muted">${esc(b.at)}</span></div><span class="pill ${b.paid?'green':'gold'}">${b.paid?'Paid':'Pending'}</span></div><table class="table"><tr><th>Item</th><th>For</th><th>Qty</th><th>Rate</th><th class="right">Amount</th></tr>${b.items.map(i=>`<tr><td>${esc(i.item)}</td><td>${esc(i.source)}</td><td>${i.qty} ${esc(i.unit)}</td><td>${money(i.rate)}</td><td class="right">${money(i.amount)}</td></tr>`).join('')}<tr><th colspan="4">Total</th><th class="right">${money(b.total)}</th></tr></table>${!b.paid&&canManage()?`<br><button onclick="payBill(${b.id})">Mark Paid by Shopper</button>`:''}</div>`).join(''):'<p class="muted">No bills yet.</p>'}</div>`}
function payBill(bid){let d=db(), b=d.bills.find(x=>x.id==bid); if(!b)return; if(shopperCash()<b.total && !confirm('Cash balance is less than bill. Mark paid anyway?'))return; b.paid=true; d.cash.unshift({id:id(),type:'Expense Paid',amount:b.total,note:'Paid bill to '+b.vendor,at:now()}); save(d); addLog('paid bill: '+money(b.total)); vendorPage()}
function shopperCash(){let d=db(); return d.cash.reduce((a,c)=>a+(c.type==='Cash Received'||c.type==='Advance Received'||c.type==='Reimbursement Received'?Number(c.amount):0)-(c.type==='Expense Paid'||c.type==='Cash Returned'?Number(c.amount):0),0)}
function cashPage(){if(!canManage()){main.innerHTML='<div class="card"><h3>Cash Book</h3><p class="muted">Only main shopper/admin can manage cash book.</p></div>';return} main.innerHTML=`<div class="card"><h3>Shopper Cash Book</h3><p class="muted">Cashier deals only with main shopper: <b>${esc(db().settings.mainShopper)}</b>. Families and cook do not receive cashier cash in this app.</p><div class="grid"><div class="stat"><span>Cash Balance</span><br><b>${money(shopperCash())}</b></div><div class="stat"><span>Unpaid Bills</span><br><b>${money(db().bills.filter(b=>!b.paid).reduce((a,b)=>a+b.total,0))}</b></div></div><hr><div class="form3"><select id="cashType"><option>Advance Received</option><option>Reimbursement Received</option><option>Cash Received</option><option>Cash Returned</option></select><input id="cashAmt" type="number" placeholder="Amount UGX"><input id="cashNote" placeholder="Note / receipt no."></div><br><button onclick="addCash()">Add Cash Entry</button></div>${balanceCard()}<div class="card"><h3>Cash Entries</h3>${cashRows()}</div>`}
function addCash(){let amt=Number(el('cashAmt').value); if(!amt)return alert('Enter amount'); let d=db(); d.cash.unshift({id:id(),type:el('cashType').value,amount:amt,note:el('cashNote').value.trim(),at:now()}); save(d); addLog(`${el('cashType').value}: ${money(amt)}`); cashPage()}
function cashRows(){let c=db().cash; if(!c.length)return '<p class="muted">No cash entries yet.</p>'; return `<table class="table"><tr><th>Date</th><th>Type</th><th>Note</th><th class="right">Amount</th></tr>${c.map(x=>`<tr><td>${esc(x.at)}</td><td>${esc(x.type)}</td><td>${esc(x.note||'')}</td><td class="right">${money(x.amount)}</td></tr>`).join('')}</table>`}
function expenseBalances(){let out={}; requesters().forEach(r=>out[r]=0); db().bills.forEach(b=>b.items.forEach(i=>{out[i.source]=(out[i.source]||0)+Number(i.amount||0)})); return out}
function balanceCard(){let exp=expenseBalances(); return `<div class="card"><h3>Account Balances / Expense Share</h3><div class="grid"><div class="stat"><span>Cash with Shopper</span><br><b>${money(shopperCash())}</b></div>${Object.keys(exp).map(k=>`<div class="stat"><span>${esc(k)}</span><br><b>${money(exp[k])}</b></div>`).join('')}</div><p class="muted smalltxt">These are expense shares from vendor bills. Cashier balance remains only between cashier and shopper.</p></div>`}
function logsPage(){main.innerHTML=`<div class="card"><h3>Activity Logs</h3>${db().logs.length?db().logs.map(l=>`<div class="item"><b>${esc(l.action)}</b><br><span class="muted">${esc(l.user)} • ${esc(l.at)}</span></div>`).join(''):'<p class="muted">No logs yet.</p>'}</div>`}
function setupCard(){if(!canManage())return ''; let s=db().settings; return `<div class="card"><h3>Setup</h3><p class="muted">Simple setup. Add your own categories, shoppers, and logins. No item catalog is fixed.</p><div class="form3"><input id="newCat" placeholder="New category"><button onclick="addCategory()">Add Category</button><button class="secondary" onclick="clearData()">Clear All Data</button></div><div class="tabs">${cats().map(c=>`<span class="pill">${esc(c)}</span>`).join('')}</div><hr><div class="form3"><input id="newShopper" placeholder="Shopper name"><button onclick="addShopper()">Add Shopper</button><select onchange="setShopper(this.value)">${(s.shoppers||[]).map(x=>`<option ${x===s.mainShopper?'selected':''}>${esc(x)}</option>`).join('')}</select></div><p class="muted">Current main shopper: <b>${esc(s.mainShopper)}</b></p><hr><div class="form3"><input id="newName" placeholder="New user display name"><select id="newRole"><option>Family</option><option>Cook</option><option>Vendor</option><option>Shopper</option></select><button onclick="addUser()">Add Login</button></div><p class="muted smalltxt">Username will be lowercase without spaces. Password: 1234.</p></div>`}
function addCategory(){let v=el('newCat').value.trim(); if(!v)return; let d=db(); if(!d.settings.categories.includes(v))d.settings.categories.push(v); save(d); addLog('added category: '+v); home()}
function addShopper(){let v=el('newShopper').value.trim(); if(!v)return; let d=db(); if(!d.settings.shoppers.includes(v))d.settings.shoppers.push(v); d.settings.mainShopper=v; save(d); addLog('main shopper set: '+v); home()}
function setShopper(v){let d=db(); d.settings.mainShopper=v; save(d); addLog('main shopper changed: '+v); home()}
function addUser(){let name=el('newName').value.trim(), role=el('newRole').value; if(!name)return; let u=name.toLowerCase().replace(/[^a-z0-9]+/g,''); let d=db(); if(allUsers().some(x=>x.u===u))return alert('User already exists'); d.settings.extraUsers.push({u,p:'1234',role,name}); if(role==='Shopper'&&!d.settings.shoppers.includes(name))d.settings.shoppers.push(name); save(d); addLog('added login: '+name); home()}
function clearData(){if(!confirm('Clear all requests, bills, cash, and logs? Setup will remain.'))return; let d=db(); d.requests=[]; d.bills=[]; d.cash=[]; d.logs=[]; save(d); addLog('cleared transaction data'); home()}
render();
</script></body></html>
