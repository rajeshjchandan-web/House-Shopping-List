<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>House Shopping List V5</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--txt:#172033;--muted:#667085;--pri:#0f766e;--pri2:#14b8a6;--danger:#dc2626;--warn:#d97706;--ok:#16a34a;--line:#e5e7eb;--shadow:0 10px 25px rgba(16,24,40,.08);}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
header{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:16px;border-radius:0 0 24px 24px;box-shadow:var(--shadow);position:sticky;top:0;z-index:5}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.brand{font-size:20px;font-weight:800}.sub{font-size:12px;opacity:.9}.pill{border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:6px 10px;font-size:12px;background:rgba(255,255,255,.15)}
main{max-width:1100px;margin:auto;padding:14px}.login{max-width:420px;margin:30px auto;background:var(--card);padding:22px;border-radius:22px;box-shadow:var(--shadow)}
.card{background:var(--card);border-radius:18px;padding:14px;margin:12px 0;box-shadow:var(--shadow);border:1px solid var(--line)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px}.stat b{display:block;font-size:20px;margin-top:6px}.muted{color:var(--muted);font-size:13px}
.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{border:0;background:#e6fffb;color:#115e59;border-radius:999px;padding:10px 13px;font-weight:700;white-space:nowrap}.tab.active{background:var(--pri);color:#fff}button{cursor:pointer;border:0;border-radius:12px;padding:10px 12px;font-weight:700;background:var(--pri);color:#fff}button.secondary{background:#e5e7eb;color:#111827}button.danger{background:var(--danger)}button.warn{background:var(--warn)}button.ok{background:var(--ok)}button.small{padding:7px 9px;font-size:12px}
input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px;background:#fff;color:#111827;font-size:15px}label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin:8px 0 4px}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.hide{display:none!important}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}.bReq{background:#fef3c7;color:#92400e}.bApp{background:#dbeafe;color:#1d4ed8}.bBuy{background:#dcfce7;color:#166534}.bNo{background:#fee2e2;color:#991b1b}.bDef{background:#f3f4f6;color:#374151}.urgent{border-left:5px solid var(--danger)}.amount{font-weight:800}.footerSpace{height:60px}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;overflow:auto;z-index:6}.bottom button{border-radius:0;background:#fff;color:#334155;min-width:95px;padding:11px 8px;font-size:12px}.bottom button.active{color:var(--pri);border-top:3px solid var(--pri)}
@media(min-width:800px){.bottom{display:none}.desktopTabs{display:flex}.mobileOnly{display:none}}@media(max-width:799px){.desktopTabs{display:none}main{padding-bottom:70px}}
</style>
</head>
<body>
<div id="loginView" class="login">
  <h2>🛒 House Shopping List</h2><p class="muted">V5 Production • Free Local Version</p>
  <label>User</label><select id="loginUser"></select>
  <label>Password</label><input id="loginPass" type="password" value="1234" />
  <button style="width:100%;margin-top:14px" onclick="login()">Login</button>
  <p class="muted">Default password for all demo users: 1234</p>
</div>
<div id="appView" class="hide">
<header><div class="top"><div><div class="brand">🛒 House Shopping List</div><div class="sub">V5 Production • Requests • Shopping • Bills • Cash • Reports</div></div><div style="text-align:right"><div class="pill" id="who"></div><button class="small secondary" onclick="logout()" style="margin-top:6px">Logout</button></div></div></header>
<main>
 <div class="tabs desktopTabs" id="tabs"></div>
 <section id="dashboard" class="page"></section>
 <section id="requests" class="page hide"></section>
 <section id="trips" class="page hide"></section>
 <section id="vendor" class="page hide"></section>
 <section id="cash" class="page hide"></section>
 <section id="reports" class="page hide"></section>
 <section id="settings" class="page hide"></section>
 <section id="logs" class="page hide"></section>
 <div class="footerSpace"></div>
</main>
<div class="bottom" id="bottomTabs"></div>
</div>
<script>
const VERSION='V5.0 CLEAN';
const LS='hsl_v5_clean_data';
const roles=['Admin','Shopper','Cook','Vendor','Family'];
const units=['Kg','Gm','Ltr','Ml','Pcs','Dozen','Packet','Box','Bag','Sack','Bundle','Bunch','Tray','Carton','Roll','Bottle','Tin','Jar'];
const baseCats=['Vegetables','Fruits','Flour & Grains','Pulses & Beans','Dairy','Spices','Oils','Household','Snacks','Tea & Beverages','Other'];
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toLocaleString('en-UG')}
function id(p){return p+Date.now()+Math.floor(Math.random()*999)}
function money(n){return 'UGX '+Number(n||0).toLocaleString('en-UG')}
let current=null, page='dashboard';
function seed(){return {settings:{shopperName:'Ashok',nextShopping:'',nextReimburse:'',categories:baseCats,locked:false},users:[{id:'admin',name:'Admin',role:'Admin',pass:'1234'},{id:'shopper',name:'Ashok',role:'Shopper',pass:'1234'},{id:'cook',name:'Phionah',role:'Cook',pass:'1234'},{id:'vendor',name:'Vegetable Vendor',role:'Vendor',pass:'1234'},{id:'family1',name:'Family 1',role:'Family',pass:'1234'},{id:'family2',name:'Family 2',role:'Family',pass:'1234'},{id:'family3',name:'Family 3',role:'Family',pass:'1234'}],items:[],requests:[],trips:[],vendorBills:[],cash:[],templates:[{id:'tpl1',name:'Ekadashi Shopping',items:[{item:'Potato',qty:5,unit:'Kg',cat:'Vegetables'},{item:'Fruits',qty:1,unit:'Box',cat:'Fruits'},{item:'Milk',qty:5,unit:'Ltr',cat:'Dairy'},{item:'Peanuts',qty:2,unit:'Kg',cat:'Pulses & Beans'}]}],logs:[]}}
function db(){let d=localStorage.getItem(LS); if(!d){localStorage.setItem(LS,JSON.stringify(seed()))} return JSON.parse(localStorage.getItem(LS))}
function save(d){localStorage.setItem(LS,JSON.stringify(d))}
function log(action,oldv='',newv=''){let d=db(); d.logs.unshift({time:now(),user:current?current.name:'System',action,oldv,newv}); save(d)}
function initLogin(){let d=db(); loginUser.innerHTML=d.users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}
function login(){let d=db(); let u=d.users.find(x=>x.id==loginUser.value&&x.pass==loginPass.value); if(!u)return alert('Wrong login'); current=u; loginView.classList.add('hide'); appView.classList.remove('hide'); who.textContent=`${u.name} • ${u.role}`; buildTabs(); render()}
function logout(){current=null; appView.classList.add('hide'); loginView.classList.remove('hide'); initLogin()}
const allTabs=[['dashboard','Home'],['requests','Requests'],['trips','Trips'],['vendor','Vendor Bills'],['cash','Cash Book'],['reports','Reports'],['settings','Settings'],['logs','Audit Log']];
function allowed(t){if(!current)return false; if(current.role=='Vendor')return ['dashboard','vendor','logs'].includes(t); if(current.role=='Cook'||current.role=='Family')return ['dashboard','requests','reports','logs'].includes(t); return true}
function buildTabs(){let arr=allTabs.filter(x=>allowed(x[0])); tabs.innerHTML=arr.map(x=>`<button class="tab ${page==x[0]?'active':''}" onclick="go('${x[0]}')">${x[1]}</button>`).join(''); bottomTabs.innerHTML=arr.slice(0,6).map(x=>`<button class="${page==x[0]?'active':''}" onclick="go('${x[0]}')">${x[1]}</button>`).join('')}
function go(p){page=p; document.querySelectorAll('.page').forEach(x=>x.classList.add('hide')); document.getElementById(p).classList.remove('hide'); buildTabs(); render()}
function requesterOptions(){let d=db(); return d.users.filter(u=>['Cook','Family'].includes(u.role)).map(u=>`<option value="${u.name}">${u.name}</option>`).join('')+`<option value="Common Kitchen">Common Kitchen</option>`}
function catOptions(sel=''){let d=db(); return d.settings.categories.map(c=>`<option ${c==sel?'selected':''}>${c}</option>`).join('')}
function unitOptions(sel=''){return units.map(u=>`<option ${u==sel?'selected':''}>${u}</option>`).join('')}
function statusBadge(s){let cls={Requested:'bReq',Approved:'bApp',Purchased:'bBuy','Not Available':'bNo',Deferred:'bDef'}[s]||'bReq';return `<span class="badge ${cls}">${s}</span>`}
function nextEkadashi(){const list=[['2026-06-11','Parama Ekadashi'],['2026-06-25','Devshayani Ekadashi'],['2026-07-10','Kamika Ekadashi'],['2026-07-25','Shravan Putrada Ekadashi'],['2026-08-09','Aja Ekadashi'],['2026-08-23','Parivartini Ekadashi']]; let t=today(); return list.find(x=>x[0]>=t)||list[0]}
function render(){let d=db(); if(page=='dashboard')renderDashboard(d); if(page=='requests')renderRequests(d); if(page=='trips')renderTrips(d); if(page=='vendor')renderVendor(d); if(page=='cash')renderCash(d); if(page=='reports')renderReports(d); if(page=='settings')renderSettings(d); if(page=='logs')renderLogs(d)}
function totals(d){let approvedSpent=0; d.vendorBills.forEach(b=>b.items.forEach(i=>approvedSpent+=Number(i.approvedQty||0)*Number(i.approvedRate||0))); let cashIn=d.cash.filter(c=>['Advance Received','Reimbursement Received'].includes(c.type)).reduce((a,c)=>a+Number(c.amount),0); let cashOut=d.cash.filter(c=>c.type=='Purchase Paid').reduce((a,c)=>a+Number(c.amount),0); return {approvedSpent,cashIn,cashOut,balance:cashIn-cashOut};}
function renderDashboard(d){let t=totals(d), e=nextEkadashi(); dashboard.innerHTML=`<div class="grid"><div class="stat">Current Shopper<b>${d.settings.shopperName}</b></div><div class="stat">Cash In Hand<b>${money(t.balance)}</b></div><div class="stat">Pending Requests<b>${d.requests.filter(r=>r.status=='Requested').length}</b></div><div class="stat">Next Ekadashi<b>${e[1]}</b><span class="muted">${e[0]}</span></div></div><div class="card"><h3>Simple Workflow</h3><p>Requests → Approval → Shopping Trip → Vendor Bill → Shopper Review → Payment → Cashier Reimbursement.</p><div class="actions"><button onclick="go('requests')">Create Request</button><button onclick="go('trips')" class="secondary">Shopping Trips</button><button onclick="go('cash')" class="secondary">Cash Book</button></div></div>`}
function renderRequests(d){let canEdit=current.role!='Vendor'; requests.innerHTML=`<div class="card"><h3>Request Management</h3>${canEdit?`<div class="row"><div><label>Requester</label><select id="rqRequester">${current.role=='Cook'||current.role=='Family'?`<option>${current.name}</option>`:requesterOptions()}</select></div><div><label>Category</label><select id="rqCat">${catOptions()}</select></div><div><label>Item</label><input id="rqItem" placeholder="Type item name" /></div><div><label>Qty</label><input id="rqQty" type="number" /></div><div><label>Unit</label><select id="rqUnit">${unitOptions()}</select></div><div><label>Priority</label><select id="rqPriority"><option>Normal</option><option>Urgent</option></select></div></div><button style="margin-top:10px" onclick="addRequest()">Add Request</button>`:''}</div><div class="card"><div class="actions"><select id="filterReq" onchange="render()"><option value="All">All Requesters</option>${[...new Set(d.requests.map(r=>r.requester))].map(r=>`<option>${r}</option>`).join('')}</select></div><div class="tableWrap"><table><thead><tr><th>Requester</th><th>Category</th><th>Item</th><th>Qty</th><th>Status</th><th>Actions</th></tr></thead><tbody>${d.requests.filter(r=>!filterReq||filterReq.value=='All'||r.requester==filterReq.value).map(r=>`<tr class="${r.priority=='Urgent'?'urgent':''}"><td>${r.requester}</td><td>${r.cat}</td><td><b>${r.item}</b><br><span class="muted">${r.priority}</span></td><td>${r.qty} ${r.unit}</td><td>${statusBadge(r.status)}</td><td class="actions">${current.role=='Admin'||current.role=='Shopper'?`<button class="small ok" onclick="setReq('${r.id}','Approved')">Approve</button><button class="small" onclick="setReq('${r.id}','Purchased')">Purchased</button><button class="small warn" onclick="setReq('${r.id}','Deferred')">Defer</button><button class="small danger" onclick="setReq('${r.id}','Not Available')">N/A</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function addRequest(){let d=db(); if(d.settings.locked && current.role!='Admin')return alert('Requests are frozen. Ask Admin/Shopper to unlock.'); let r={id:id('r'),requester:rqRequester.value,cat:rqCat.value,item:rqItem.value.trim(),qty:Number(rqQty.value),unit:rqUnit.value,priority:rqPriority.value,status:'Requested',date:today()}; if(!r.item||!r.qty)return alert('Enter item and quantity'); d.requests.unshift(r); if(!d.items.find(i=>i.name.toLowerCase()==r.item.toLowerCase()))d.items.push({name:r.item,cat:r.cat,unit:r.unit}); save(d); log('Request added','',`${r.requester} ${r.item} ${r.qty} ${r.unit}`); render()}
function setReq(rid,s){let d=db(); let r=d.requests.find(x=>x.id==rid); let old=r.status; r.status=s; save(d); log('Request status changed',old,s+' - '+r.item); render()}
function renderTrips(d){trips.innerHTML=`<div class="card"><h3>Shopping Trips</h3><div class="row"><div><label>Shopping Date</label><input id="tripDate" type="date" value="${d.settings.nextShopping||today()}"></div><div><label>Shopper</label><input id="tripShopper" value="${d.settings.shopperName}"></div></div><button style="margin-top:10px" onclick="createTrip()">Create Trip From Approved Requests</button></div><div class="card"><h3>Trips</h3>${d.trips.map(tr=>`<div class="card"><b>${tr.name}</b><br><span class="muted">${tr.date} • Shopper: ${tr.shopper} • ${tr.status}</span><div class="tableWrap"><table><tr><th>Requester</th><th>Item</th><th>Qty</th><th>Status</th><th>Action</th></tr>${tr.items.map(i=>`<tr><td>${i.requester}</td><td>${i.item}</td><td>${i.qty} ${i.unit}</td><td>${statusBadge(i.status)}</td><td><button class="small ok" onclick="tripItem('${tr.id}','${i.id}','Purchased')">Purchased</button><button class="small danger" onclick="tripItem('${tr.id}','${i.id}','Not Available')">N/A</button><button class="small warn" onclick="tripItem('${tr.id}','${i.id}','Deferred')">Deferred</button></td></tr>`).join('')}</table></div></div>`).join('')}</div>`}
function createTrip(){let d=db(); let items=d.requests.filter(r=>r.status=='Approved').map(r=>({...r,status:'Approved'})); if(!items.length)return alert('No approved requests'); let tr={id:id('tr'),name:'Trip '+tripDate.value,date:tripDate.value,shopper:tripShopper.value,status:'Open',items}; d.trips.unshift(tr); save(d); log('Shopping trip created','',tr.name); render()}
function tripItem(tid,iid,s){let d=db(); let tr=d.trips.find(x=>x.id==tid); let it=tr.items.find(x=>x.id==iid); let old=it.status; it.status=s; let req=d.requests.find(r=>r.id==iid); if(req)req.status=s; save(d); log('Trip item status changed',old,s+' - '+it.item); render()}
function renderVendor(d){let approved=d.requests.filter(r=>r.status=='Approved'&&['Vegetables','Fruits'].includes(r.cat)); vendor.innerHTML=`<div class="card"><h3>Vendor Billing</h3><p class="muted">Vendor enters original rate. Shopper can later edit approved quantity/rate. Both values are saved.</p><button onclick="makeVendorBill()">Create Vendor Bill From Approved Vegetable/Fruit Items</button></div><div class="card"><h3>Vendor Bills</h3>${d.vendorBills.map(b=>`<div class="card"><b>${b.vendor}</b> • ${b.date} • ${b.status}<div class="tableWrap"><table><tr><th>Item</th><th>Qty</th><th>Vendor Rate</th><th>Approved Qty</th><th>Approved Rate</th><th>Amount</th><th>Reason</th></tr>${b.items.map((i,idx)=>`<tr><td>${i.item}<br><span class="muted">${i.requester}</span></td><td>${i.vendorQty} ${i.unit}</td><td><input type="number" value="${i.vendorRate||''}" onchange="billEdit('${b.id}',${idx},'vendorRate',this.value)"></td><td><input type="number" value="${i.approvedQty||i.vendorQty}" onchange="billEdit('${b.id}',${idx},'approvedQty',this.value)"></td><td><input type="number" value="${i.approvedRate||i.vendorRate||''}" onchange="billEdit('${b.id}',${idx},'approvedRate',this.value)"></td><td class="amount">${money((i.approvedQty||0)*(i.approvedRate||0))}</td><td><input value="${i.reason||''}" onchange="billEdit('${b.id}',${idx},'reason',this.value)" placeholder="Negotiated / error"></td></tr>`).join('')}</table></div><div class="actions"><b>Total: ${money(b.items.reduce((a,i)=>a+(Number(i.approvedQty||0)*Number(i.approvedRate||0)),0))}</b><button class="ok" onclick="approveBill('${b.id}')">Approve</button><button onclick="payBill('${b.id}')">Pay</button></div></div>`).join('')}</div>`}
function makeVendorBill(){let d=db(); let items=d.requests.filter(r=>r.status=='Approved'&&['Vegetables','Fruits'].includes(r.cat)).map(r=>({requestId:r.id,requester:r.requester,item:r.item,unit:r.unit,vendorQty:r.qty,vendorRate:0,approvedQty:r.qty,approvedRate:0,reason:''})); if(!items.length)return alert('No approved vegetable/fruit items'); d.vendorBills.unshift({id:id('b'),vendor:'Vegetable Vendor',date:today(),status:'Submitted',items}); save(d); log('Vendor bill created','',items.length+' items'); render()}
function billEdit(bid,idx,field,val){let d=db(); let b=d.vendorBills.find(x=>x.id==bid); let old=b.items[idx][field]; b.items[idx][field]=['vendorRate','approvedQty','approvedRate'].includes(field)?Number(val):val; save(d); log('Vendor bill edited',`${field}: ${old}`,`${field}: ${val}`); render()}
function approveBill(bid){let d=db(); let b=d.vendorBills.find(x=>x.id==bid); let old=b.status; b.status='Approved'; save(d); log('Bill approved',old,bid); render()}
function payBill(bid){let d=db(); let b=d.vendorBills.find(x=>x.id==bid); let amt=b.items.reduce((a,i)=>a+(Number(i.approvedQty||0)*Number(i.approvedRate||0)),0); b.status='Paid'; d.cash.unshift({id:id('c'),date:today(),type:'Purchase Paid',amount:amt,remark:'Paid '+b.vendor+' bill '+bid}); save(d); log('Bill paid','',money(amt)); render()}
function renderCash(d){let t=totals(d); cash.innerHTML=`<div class="grid"><div class="stat">Cashier ⇄ Shopper Only<b>${d.settings.shopperName}</b></div><div class="stat">Cash In<b>${money(t.cashIn)}</b></div><div class="stat">Cash Out<b>${money(t.cashOut)}</b></div><div class="stat">Current Balance<b>${money(t.balance)}</b></div></div><div class="card"><h3>Add Cash Entry</h3><div class="row"><div><label>Type</label><select id="cashType"><option>Advance Received</option><option>Reimbursement Received</option><option>Purchase Paid</option></select></div><div><label>Amount UGX</label><input id="cashAmt" type="number"></div><div><label>Remark</label><input id="cashRemark" placeholder="From cashier / bill paid"></div></div><button style="margin-top:10px" onclick="addCash()">Add Entry</button></div><div class="card"><h3>Cash Book</h3><table><tr><th>Date</th><th>Type</th><th>Amount</th><th>Remark</th></tr>${d.cash.map(c=>`<tr><td>${c.date}</td><td>${c.type}</td><td class="amount">${money(c.amount)}</td><td>${c.remark||''}</td></tr>`).join('')}</table></div>`}
function addCash(){let d=db(); if(!cashAmt.value)return alert('Enter amount'); d.cash.unshift({id:id('c'),date:today(),type:cashType.value,amount:Number(cashAmt.value),remark:cashRemark.value}); save(d); log('Cash entry added','',cashType.value+' '+money(cashAmt.value)); render()}
function renderReports(d){let requesterTotals={}; d.vendorBills.forEach(b=>b.items.forEach(i=>{requesterTotals[i.requester]=(requesterTotals[i.requester]||0)+(Number(i.approvedQty||0)*Number(i.approvedRate||0))})); let priceRows=[]; d.vendorBills.forEach(b=>b.items.forEach(i=>priceRows.push({item:i.item,rate:i.approvedRate||i.vendorRate,date:b.date}))); reports.innerHTML=`<div class="card"><h3>Reports</h3><div class="grid">${Object.entries(requesterTotals).map(([k,v])=>`<div class="stat">${k}<b>${money(v)}</b></div>`).join('')||'<p>No spending yet.</p>'}</div></div><div class="card"><h3>Market Price Book</h3><table><tr><th>Item</th><th>Rate</th><th>Date</th></tr>${priceRows.map(p=>`<tr><td>${p.item}</td><td>${money(p.rate)}</td><td>${p.date}</td></tr>`).join('')}</table></div>`}
function renderSettings(d){settings.innerHTML=`<div class="card"><h3>Settings</h3><div class="row"><div><label>Main Shopper Name</label><input id="setShopper" value="${d.settings.shopperName}"></div><div><label>Next Shopping Date</label><input id="setShopping" type="date" value="${d.settings.nextShopping}"></div><div><label>Next Reimbursement Date</label><input id="setReimburse" type="date" value="${d.settings.nextReimburse}"></div><div><label>Request Freeze</label><select id="setLocked"><option ${!d.settings.locked?'selected':''} value="false">Open</option><option ${d.settings.locked?'selected':''} value="true">Frozen</option></select></div></div><button style="margin-top:10px" onclick="saveSettings()">Save Settings</button></div><div class="card"><h3>Users</h3><div class="row"><input id="uName" placeholder="Name"><select id="uRole">${roles.map(r=>`<option>${r}</option>`).join('')}</select><input id="uPass" placeholder="Password" value="1234"></div><button style="margin-top:10px" onclick="addUser()">Add User</button><table><tr><th>Name</th><th>Role</th><th>Password</th></tr>${d.users.map(u=>`<tr><td>${u.name}</td><td>${u.role}</td><td>${u.pass}</td></tr>`).join('')}</table></div><div class="card"><h3>Categories</h3><textarea id="cats" rows="5">${d.settings.categories.join('\n')}</textarea><button onclick="saveCats()">Save Categories</button></div><div class="card"><h3>Favorite Templates</h3><div class="row"><input id="tplName" placeholder="Template name"><textarea id="tplItems" placeholder="One item per line: Item,Qty,Unit,Category"></textarea></div><button onclick="addTemplate()">Save Template</button>${d.templates.map(t=>`<div class="card"><b>${t.name}</b><button class="small" onclick="loadTemplate('${t.id}')">Load As Requests</button></div>`).join('')}</div>`}
function saveSettings(){let d=db(); d.settings.shopperName=setShopper.value; d.settings.nextShopping=setShopping.value; d.settings.nextReimburse=setReimburse.value; d.settings.locked=setLocked.value=='true'; save(d); log('Settings updated','',''); render(); initLogin()}
function addUser(){let d=db(); if(!uName.value)return; d.users.push({id:id('u'),name:uName.value,role:uRole.value,pass:uPass.value||'1234'}); save(d); log('User added','',uName.value); render(); initLogin()}
function saveCats(){let d=db(); d.settings.categories=cats.value.split('\n').map(x=>x.trim()).filter(Boolean); save(d); log('Categories updated','',''); render()}
function addTemplate(){let d=db(); let items=tplItems.value.split('\n').map(l=>{let [item,qty,unit,cat]=l.split(',').map(x=>x&&x.trim()); return {item,qty:Number(qty||1),unit:unit||'Pcs',cat:cat||'Other'}}).filter(x=>x.item); d.templates.push({id:id('tpl'),name:tplName.value||'Template',items}); save(d); log('Template added','',tplName.value); render()}
function loadTemplate(tid){let d=db(); let t=d.templates.find(x=>x.id==tid); let requester=current.role=='Cook'||current.role=='Family'?current.name:'Common Kitchen'; t.items.forEach(x=>d.requests.unshift({id:id('r'),requester,cat:x.cat,item:x.item,qty:x.qty,unit:x.unit,priority:'Normal',status:'Requested',date:today()})); save(d); log('Template loaded','',t.name); go('requests')}
function renderLogs(d){logs.innerHTML=`<div class="card"><h3>Audit Log</h3><table><tr><th>Time</th><th>User</th><th>Action</th><th>Old</th><th>New</th></tr>${d.logs.map(l=>`<tr><td>${l.time}</td><td>${l.user}</td><td>${l.action}</td><td>${l.oldv||''}</td><td>${l.newv||''}</td></tr>`).join('')}</table></div>`}
initLogin();
</script>
</body>
</html>
