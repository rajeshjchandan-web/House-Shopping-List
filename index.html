<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>House Shopping List V3.2</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#17202a;--muted:#687385;--brand:#168a5a;--gold:#f2b705;--danger:#d64545;--line:#e5e8ef;--soft:#eef9f3;--shadow:0 12px 28px rgba(20,30,50,.08)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:86px}button,input,select,textarea{font:inherit}button{border:0;border-radius:14px;padding:12px 14px;background:var(--brand);color:white;font-weight:800;cursor:pointer}button.secondary{background:#eef1f6;color:var(--ink)}button.gold{background:var(--gold);color:#241b00}button.warn{background:var(--danger)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:white}.wrap{max-width:1060px;margin:auto;padding:12px}.top{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#137c52,#24aa70);color:white;padding:calc(12px + env(safe-area-inset-top)) 14px 14px;border-radius:0 0 22px 22px;box-shadow:var(--shadow)}.title{display:flex;justify-content:space-between;align-items:center;gap:10px}.title h1{font-size:21px;margin:0}.tag{font-size:12px;opacity:.92}.card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;padding:14px;margin:12px 0}.card h2,.card h3{margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{padding:12px;border-radius:18px;background:var(--soft);border:1px solid #d8f1e5}.stat b{font-size:20px}.muted{color:var(--muted);font-size:13px}.small{font-size:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:10px}.form{display:grid;grid-template-columns:1.3fr 1fr .7fr .8fr;gap:8px}.form2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.form4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{white-space:nowrap;background:white;color:var(--ink);border:1px solid var(--line);padding:9px 12px}.tab.active{background:var(--brand);color:white}.list{display:grid;gap:8px}.item{background:white;border:1px solid var(--line);border-radius:18px;padding:12px}.item.done{opacity:.65;background:#f1f5f3}.badge{display:inline-flex;border-radius:99px;padding:5px 9px;background:#eef1f6;color:#344054;font-size:12px;font-weight:800}.badge.green{background:#e3f8ec;color:#16633f}.badge.gold{background:#fff3cd;color:#705100}.badge.red{background:#ffe8e8;color:#9b2323}.check{width:26px;height:26px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}.right{text-align:right!important}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#eafff2,#f7fbff)}.loginbox{width:min(460px,100%);background:white;border-radius:28px;box-shadow:var(--shadow);padding:22px}.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);z-index:10;padding:6px env(safe-area-inset-right) calc(6px + env(safe-area-inset-bottom)) env(safe-area-inset-left)}.nav button{background:transparent;color:#506070;border-radius:12px;padding:7px 2px;font-size:10.5px}.nav button.active{background:#e9f7ef;color:var(--brand)}hr{border:0;border-top:1px solid var(--line);margin:14px 0}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.form,.form2,.form4{grid-template-columns:1fr}.title h1{font-size:18px}.wrap{padding:10px}.card{border-radius:18px}.table{display:block;overflow:auto}.top{border-radius:0 0 18px 18px}}
</style>
</head>
<body><div id="app"></div>
<script>
const APP_VERSION='V3.2 - cashier only deals with main shopper + account balances - 2026-06-08';
const DB_KEY='hsl_v31_free_local';
const OLD_KEYS=['hsl_v1_free_local','hsl_v2_free_local','hsl_v3_free_local'];
const units=['Kg','Gm','Ltr','Ml','Pcs','Dozen','Packet','Box','Bag','Sack','Bundle','Bunch','Tray','Carton','Roll','Bottle','Tin','Jar'];
const baseUsers=[
 {u:'admin',p:'1234',role:'Admin',name:'Admin'},
 {u:'ashok',p:'1234',role:'Shopper',name:'Ashok'},
 {u:'phionah',p:'1234',role:'Cook',name:'Phionah'},
 {u:'vendor',p:'1234',role:'Vendor',name:'Nakasero Vendor'},
 {u:'family1',p:'1234',role:'Family',name:'Family A'},
 {u:'family2',p:'1234',role:'Family',name:'Family B'},
 {u:'family3',p:'1234',role:'Family',name:'Family C'}
];
function seed(){return{requests:[],bills:[],cash:[],logs:[],settings:{mainShopper:'Ashok',shoppers:['Ashok'],categories:['Vegetables','Fruits','Flour & Grains','Pulses & Beans','Dairy','Spices','Oils','Household','Snacks','Tea & Beverages','Other'],ekadashiName:'Next Swaminarayan Ekadashi',ekadashiDate:'',cycleDays:14,extraUsers:[]}}}
function db(){let raw=localStorage.getItem(DB_KEY); if(!raw){localStorage.setItem(DB_KEY,JSON.stringify(seed()))} let d=JSON.parse(localStorage.getItem(DB_KEY)); d.settings=d.settings||seed().settings; d.requests=d.requests||[]; d.bills=d.bills||[]; d.cash=d.cash||[]; d.logs=d.logs||[]; return d}
function save(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
function users(){return [...baseUsers,...(db().settings.extraUsers||[])]}
function cats(){return db().settings.categories||[]}
function shoppers(){return db().settings.shoppers||['Ashok']}
function requesters(){let names=['Common Kitchen','Family A','Family B','Family C']; db().requests.forEach(r=>{if(r.source&&!names.includes(r.source))names.push(r.source)}); users().filter(u=>u.role==='Family').forEach(u=>{if(!names.includes(u.name))names.push(u.name)}); return names}
function money(n){return 'UGX '+Number(n||0).toLocaleString()}
function now(){return new Date().toLocaleString()}
function el(id){return document.getElementById(id)}
function log(action){let d=db(); d.logs.unshift({id:Date.now()+Math.random(),user:session?session.name:'System',action,at:now()}); save(d)}
let session=JSON.parse(localStorage.getItem('hsl_session')||'null'); let tab='home', filterCat='All', filterRequester='All';
function render(){session?shell():login()}
function login(){let list=users(); app.innerHTML=`<div class="login"><div class="loginbox"><div style="font-size:38px">🛒</div><h2>House Shopping List</h2><p class="muted">${APP_VERSION}</p><label>User</label><select id="lu">${list.map(u=>`<option value="${u.u}">${u.name} (${u.role})</option>`).join('')}</select><br><br><label>Password</label><input id="lp" type="password" value="1234"><br><br><button onclick="doLogin()">Login</button><p class="muted small">Default password: 1234</p></div></div>`}
function doLogin(){let u=users().find(x=>x.u===lu.value&&x.p===lp.value); if(!u)return alert('Wrong login'); session=u; localStorage.setItem('hsl_session',JSON.stringify(u)); log('logged in'); render()}
function logout(){localStorage.removeItem('hsl_session'); session=null; render()}
function shell(){document.body.innerHTML='<div id="app"></div>'; app.innerHTML=`<div class="top"><div class="title"><div><h1>🛒 House Shopping List</h1><div class="tag">${session.name} • ${session.role} • ${APP_VERSION}</div></div><button class="secondary" onclick="logout()">Logout</button></div></div><div class="wrap" id="main"></div><div class="nav">${['home','request','shopping','vendor','cash','logs'].map(x=>`<button class="${tab===x?'active':''}" onclick="tab='${x}';shell()">${navIcon(x)}<br>${label(x)}</button>`).join('')}</div>`; draw()}
function navIcon(x){return{home:'🏠',request:'📝',shopping:'🛒',vendor:'🥬',cash:'💰',logs:'📜'}[x]}
function label(x){return{home:'Home',request:'Requests',shopping:'Shopping',vendor:'Vendor/Bills',cash:'Cash Book',logs:'Logs'}[x]}
function draw(){({home,request,shopping,vendor,cash,logs}[tab])()}
function home(){let d=db(), open=d.requests.filter(r=>!r.purchased).length, done=d.requests.filter(r=>r.purchased).length, unpaid=d.bills.filter(b=>!b.paid).reduce((a,b)=>a+b.total,0); main.innerHTML=`<div class="grid"><div class="stat"><span>Open Requests</span><br><b>${open}</b></div><div class="stat"><span>Shopping Done</span><br><b>${d.requests.length?Math.round(done/d.requests.length*100):0}%</b></div><div class="stat"><span>Unpaid Bills</span><br><b>${money(unpaid)}</b></div><div class="stat"><span>Main Shopper</span><br><b>${d.settings.mainShopper||'Ashok'}</b></div></div>${ekadashiCard()}${cycleCard()}${balanceCard()}${setupCard()}`}
function ekadashiCard(){let s=db().settings;return `<div class="card"><div class="between"><div><h3>🔔 Swaminarayan Ekadashi Reminder</h3><div class="muted">Saturday & Sunday alert for planning fasting groceries.</div></div><span class="badge gold">100% Vegetarian</span></div><p><b>${s.ekadashiName}</b><br>Date: ${s.ekadashiDate||'Set date below'}</p>${canManage()?`<div class="form2"><input id="ekn" value="${s.ekadashiName}" placeholder="Ekadashi name"><input id="ekd" type="date" value="${s.ekadashiDate}"><button onclick="saveEk()">Save</button></div>`:''}</div>`}
function cycleCard(){let s=db().settings;return `<div class="card"><h3>📅 2-Week Shopping Cycle</h3><p><b>Main Shopper:</b> ${s.mainShopper||'Ashok'}<br><b>Shopping:</b> Every 2nd Sunday<br><b>Reimbursement + Next Advance:</b> Following Saturday</p><div class="muted">Requests can be entered before shopping day. The selected shopper can filter by requester and tick items.</div></div>`}
function canManage(){return ['Admin','Shopper'].includes(session.role)}
function request(){let can=session.role!=='Vendor'; let defaultSrc=session.role==='Cook'?'Common Kitchen':session.role==='Family'?session.name:'Common Kitchen'; main.innerHTML=`${can?`<div class="card"><h3>Add Request</h3><p class="muted">No fixed item list. Type any vegetarian item manually.</p><div class="form"><input id="item" placeholder="Item name"><select id="cat">${cats().map(c=>`<option>${c}</option>`).join('')}</select><input id="qty" type="number" placeholder="Qty"><select id="unit">${units.map(u=>`<option>${u}</option>`).join('')}</select></div><br><div class="form2"><select id="src">${requesters().map(r=>`<option ${r===defaultSrc?'selected':''}>${r}</option>`).join('')}</select><select id="urgent"><option value="No">Normal</option><option value="Yes">Urgent</option></select><button onclick="addReq()">Submit Request</button></div></div>`:''}<div class="card"><h3>Requests</h3>${filters('request')}<div class="list">${listReq(false)}</div></div>`}
function filters(where){return `<div class="form2"><select onchange="filterCat=this.value;${where}()"><option>All</option>${cats().map(c=>`<option ${filterCat===c?'selected':''}>${c}</option>`).join('')}</select><select onchange="filterRequester=this.value;${where}()"><option>All</option>${requesters().map(r=>`<option ${filterRequester===r?'selected':''}>${r}</option>`).join('')}</select><button class="secondary" onclick="filterCat='All';filterRequester='All';${where}()">Clear Filters</button></div><br>`}
function addReq(){let name=item.value.trim(); if(!name||!qty.value)return alert('Enter item and quantity'); let d=db(); d.requests.unshift({id:Date.now()+Math.random(),item:name,cat:cat.value,qty:Number(qty.value),unit:unit.value,source:src.value,urgent:urgent.value==='Yes',purchased:false,unavailable:false,createdBy:session.name,at:now()}); save(d); log(`added request: ${name} ${qty.value} ${unit.value} for ${src.value}`); request()}
function filteredRequests(){let r=db().requests; if(filterCat!=='All')r=r.filter(x=>x.cat===filterCat); if(filterRequester!=='All')r=r.filter(x=>x.source===filterRequester); if(session.role==='Family')r=r.filter(x=>x.source===session.name); if(session.role==='Vendor')r=r.filter(x=>['Vegetables','Fruits'].includes(x.cat)); return r}
function listReq(shoppingMode){let r=filteredRequests(); if(!r.length)return '<p class="muted">No items found.</p>'; return r.map(x=>`<div class="item ${x.purchased?'done':''}"><div class="between"><div><b>${x.urgent?'🚨 ':''}${x.item}</b> <span class="badge">${x.qty} ${x.unit}</span>${x.unavailable?' <span class="badge red">Not Available</span>':''}<br><span class="muted">${x.cat} • ${x.source} • by ${x.createdBy} • ${x.at}</span></div>${shoppingMode&&session.role!=='Vendor'?`<input class="check" type="checkbox" ${x.purchased?'checked':''} onchange="toggleBuy(${x.id},this.checked)">`:''}</div>${shoppingMode&&session.role!=='Vendor'?`<div class="row" style="margin-top:8px"><button class="secondary" onclick="markUnavailable(${x.id})">Not Available</button><button class="secondary" onclick="removeReq(${x.id})">Delete</button></div>`:''}</div>`).join('')}
function shopping(){let d=db(); main.innerHTML=`<div class="card"><div class="between"><div><h3>Shopping Checklist</h3><div class="muted">Current main shopper: <b>${d.settings.mainShopper||'Ashok'}</b></div></div><span class="badge green">${d.requests.filter(x=>x.purchased).length}/${d.requests.length}</span></div>${canManage()?`<div class="form2"><select onchange="setMainShopper(this.value)">${shoppers().map(s=>`<option ${s===(d.settings.mainShopper||'Ashok')?'selected':''}>${s}</option>`).join('')}</select><input id="newShopperTop" placeholder="Add shopper name"><button onclick="addShopperTop()">Add/Select Shopper</button></div><br>`:''}${filters('shopping')}<div class="list">${listReq(true)}</div></div>`}
function toggleBuy(id,v){let d=db(),x=d.requests.find(r=>r.id==id); if(!x)return; x.purchased=v; save(d); log(`${v?'purchased':'unchecked'} ${x.item} (${x.source})`); shopping()}
function markUnavailable(id){let d=db(),x=d.requests.find(r=>r.id==id); if(!x)return; x.unavailable=true; save(d); log(`marked not available: ${x.item}`); shopping()}
function removeReq(id){let d=db(),x=d.requests.find(r=>r.id==id); d.requests=d.requests.filter(r=>r.id!=id); save(d); log(`deleted request: ${x?x.item:''}`); shopping()}
function vendor(){main.innerHTML=`${vendorEntry()}${billsCard()}`}
function vendorEntry(){let veg=db().requests.filter(x=>['Vegetables','Fruits'].includes(x.cat)); if(session.role!=='Vendor'&&!canManage())return ''; return `<div class="card"><h3>🥬 Vendor Bill Entry</h3><p class="muted">Vendor can enter Qty Given and Rate, then generate bill.</p><table class="table"><tr><th>Item</th><th>Requested</th><th>For</th><th>Qty Given</th><th>Unit</th><th>Rate</th></tr>${veg.map(x=>`<tr><td>${x.item}</td><td>${x.qty} ${x.unit}</td><td>${x.source}</td><td><input id="given_${x.id}" type="number" value="${x.qty}"></td><td><select id="vunit_${x.id}">${units.map(u=>`<option ${u===x.unit?'selected':''}>${u}</option>`).join('')}</select></td><td><input id="rate_${x.id}" type="number" placeholder="UGX"></td></tr>`).join('')}</table><br><button onclick="makeBill()">Generate Vendor Bill</button></div>`}
function makeBill(){let d=db(); let rows=d.requests.filter(x=>['Vegetables','Fruits'].includes(x.cat)).map(x=>({requestId:x.id,item:x.item,source:x.source,qty:Number((el('given_'+x.id)||{}).value||0),unit:(el('vunit_'+x.id)||{}).value||x.unit,rate:Number((el('rate_'+x.id)||{}).value||0)})).filter(x=>x.qty>0&&x.rate>0); if(!rows.length)return alert('Enter at least one Qty Given and Rate'); let total=rows.reduce((a,b)=>a+b.qty*b.rate,0); d.bills.unshift({id:Date.now()+Math.random(),vendor:session.name,items:rows,total,paid:false,at:now()}); save(d); log(`vendor bill generated: ${money(total)}`); vendor()}
function billsCard(){let d=db();return `<div class="card"><h3>Bills & Payments</h3>${d.bills.map(b=>`<div class="item"><div class="between"><div><b>${b.vendor}</b><br><span class="muted">${b.at}</span></div><span class="badge ${b.paid?'green':'gold'}">${b.paid?'Paid':'Pending'}</span></div><table class="table"><tr><th>Item</th><th>For</th><th>Qty</th><th>Rate</th><th class="right">Amount</th></tr>${b.items.map(i=>`<tr><td>${i.item}</td><td>${i.source}</td><td>${i.qty} ${i.unit}</td><td>${money(i.rate)}</td><td class="right">${money(i.qty*i.rate)}</td></tr>`).join('')}<tr><th colspan="4">Total</th><th class="right">${money(b.total)}</th></tr></table>${!b.paid&&canManage()?`<br><button onclick="payBill(${b.id})">Mark Paid</button>`:''}</div>`).join('')||'<p class="muted">No bills yet.</p>'}</div>`}
function payBill(id){let d=db(),b=d.bills.find(x=>x.id==id); if(!b)return; b.paid=true; d.cash.unshift({id:Date.now()+Math.random(),type:'Purchase Payment',account:d.settings.mainShopper||'Main Shopper',source:b.vendor,amount:b.total,remarks:'Bill paid from shopper cash',at:now()}); save(d); log(`paid bill from shopper cash: ${money(b.total)}`); vendor()}

function cash(){if(!canManage()){main.innerHTML='<div class="card"><h3>Cash Book</h3><p class="muted">Only Admin and main shopper can see cash book.</p></div>';return} let d=db(), shopper=d.settings.mainShopper||'Ashok'; main.innerHTML=`${balanceCard()}<div class="card"><h3>💰 Shopper Cash Book</h3><p class="muted">Company cashier deals only with the main shopper. Cook and families do not receive cash from cashier; their orders only create expense balances.</p><div class="form2"><select id="ctype"><option>Advance from Cashier</option><option>Reimbursement from Cashier</option><option>Cash Returned to Cashier</option><option>Other Adjustment</option></select><input id="camt" type="number" placeholder="Amount UGX"><input id="crem" placeholder="Remarks / bill cycle / receipt note"></div><br><button onclick="addCash()">Add Cash Entry</button><hr><table class="table"><tr><th>Date</th><th>Type</th><th>Shopper</th><th>Remarks</th><th class="right">Amount</th></tr>${db().cash.map(c=>`<tr><td>${c.at}</td><td>${c.type}</td><td>${c.account||shopper}</td><td>${c.remarks||c.source||''}</td><td class="right">${money(c.amount)}</td></tr>`).join('')}</table></div>`}
function signedCash(c){if(['Advance from Cashier','Reimbursement from Cashier','Other Adjustment'].includes(c.type))return Number(c.amount||0); if(['Purchase Payment','Spent','Cash Returned to Cashier','Return Balance'].includes(c.type))return -Number(c.amount||0); return 0}
function shopperCashBalance(){return db().cash.reduce((a,c)=>a+signedCash(c),0)}
function expenseBalances(){let out={}; requesters().forEach(r=>out[r]=0); db().bills.forEach(b=>{b.items.forEach(i=>{out[i.source]=(out[i.source]||0)+(Number(i.qty||0)*Number(i.rate||0))})}); return out}
function balanceCard(){let d=db(), shopper=d.settings.mainShopper||'Ashok', exp=expenseBalances(), keys=Object.keys(exp); return `<div class="card"><h3>Remaining Balances</h3><div class="grid"><div class="stat"><span>Cash with ${shopper}</span><br><b>${money(shopperCashBalance())}</b></div>${keys.map(k=>`<div class="stat"><span>${k} Expense</span><br><b>${money(exp[k])}</b></div>`).join('')}</div><p class="muted small">Cashier balance is only between cashier and main shopper. Family/cook balances show their purchase expense share from generated bills.</p></div>`}
function addCash(){if(!camt.value)return alert('Enter amount'); let d=db(), shopper=d.settings.mainShopper||'Ashok'; d.cash.unshift({id:Date.now()+Math.random(),type:ctype.value,account:shopper,source:'Company Cashier',amount:Number(camt.value||0),remarks:crem.value,at:now()}); save(d); log(`cash ${ctype.value} ${money(camt.value)} with ${shopper}`); cash()}
function logs(){let d=db(); main.innerHTML=`<div class="card"><h3>Activity Logs</h3>${d.logs.map(l=>`<div class="item"><b>${l.user}</b> <span class="muted">${l.at}</span><br>${l.action}</div>`).join('')||'<p class="muted">No logs yet.</p>'}</div>`}
function setupCard(){if(!canManage())return '';let s=db().settings;return `<div class="card"><h3>⚙️ Setup</h3><p class="muted">Add categories, shoppers, and logins. No item names are preloaded.</p><div class="form2"><input id="newCat" placeholder="New category"><button onclick="addCategory()">Add Category</button><button class="secondary" onclick="clearAllDemo()">Clear All Data</button></div><div class="tabs">${cats().map(c=>`<span class="badge">${c}</span>`).join('')}</div><hr><div class="form2"><input id="newShopper" placeholder="Shopper name"><button onclick="addShopper()">Add/Select Shopper</button><select onchange="setMainShopper(this.value)">${shoppers().map(x=>`<option ${x===s.mainShopper?'selected':''}>${x}</option>`).join('')}</select></div><p class="muted small">Current main shopper: <b>${s.mainShopper}</b></p><hr><div class="form2"><input id="newUserName" placeholder="New login display name"><select id="newUserRole"><option>Family</option><option>Cook</option><option>Vendor</option><option>Shopper</option></select><button onclick="addUserLogin()">Add Login</button></div><p class="muted small">Username will be created from the name. Password: 1234</p></div>`}
function saveEk(){let d=db(); d.settings.ekadashiName=ekn.value; d.settings.ekadashiDate=ekd.value; save(d); log('updated Ekadashi reminder'); home()}
function addCategory(){let v=newCat.value.trim(); if(!v)return; let d=db(); if(!d.settings.categories.includes(v))d.settings.categories.push(v); save(d); log('added category '+v); home()}
function addShopper(){let v=newShopper.value.trim(); if(!v)return; addShopperName(v); home()}
function addShopperTop(){let v=newShopperTop.value.trim(); if(!v)return; addShopperName(v); shopping()}
function addShopperName(v){let d=db(); if(!d.settings.shoppers.includes(v))d.settings.shoppers.push(v); d.settings.mainShopper=v; save(d); log('changed main shopper to '+v)}
function setMainShopper(v){let d=db(); d.settings.mainShopper=v; save(d); log('changed main shopper to '+v); shopping()}
function addUserLogin(){let name=newUserName.value.trim(); if(!name)return; let d=db(); let u=name.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,18)||('user'+Date.now()); if(users().some(x=>x.u===u))u=u+Math.floor(Math.random()*99); d.settings.extraUsers.push({u,p:'1234',role:newUserRole.value,name}); if(newUserRole.value==='Shopper'&&!d.settings.shoppers.includes(name))d.settings.shoppers.push(name); save(d); log('added login '+name); home(); alert('Login created: '+u+' / 1234')}
function clearAllDemo(){if(!confirm('Clear all requests, bills, cash and logs?'))return; let d=db(); d.requests=[]; d.bills=[]; d.cash=[]; d.logs=[]; save(d); log('cleared all data'); home()}
render();
</script></body></html>
