<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>House Shopping List</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#17202a;--muted:#687385;--brand:#1f8a5b;--brand2:#f2b705;--danger:#d64545;--line:#e5e8ef;--soft:#eef9f3;--shadow:0 12px 30px rgba(20,30,50,.08)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:76px}button,input,select,textarea{font:inherit}button{border:0;border-radius:14px;padding:12px 14px;background:var(--brand);color:#fff;font-weight:800;cursor:pointer}button.secondary{background:#eef1f6;color:var(--ink)}button.warn{background:var(--danger)}button.gold{background:var(--brand2);color:#241b00}.wrap{max-width:980px;margin:auto;padding:14px}.top{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#137c52,#25ad72);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 14px 14px;border-radius:0 0 24px 24px;box-shadow:var(--shadow)}.title{display:flex;justify-content:space-between;align-items:center;gap:10px}.title h1{font-size:22px;margin:0}.tag{font-size:12px;opacity:.9}.pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:8px 10px;border-radius:99px;font-size:12px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;padding:14px;margin:12px 0}.card h2,.card h3{margin:0 0 10px}.stat{padding:12px;border-radius:18px;background:var(--soft);border:1px solid #d8f1e5}.stat b{font-size:20px}.muted{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:10px}.form{display:grid;grid-template-columns:1.4fr 1fr .7fr .9fr;gap:8px}.form2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:var(--ink)}textarea{min-height:82px}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{white-space:nowrap;background:#fff;color:var(--ink);border:1px solid var(--line);padding:10px 12px}.tab.active{background:var(--brand);color:#fff}.list{display:grid;gap:8px}.item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.item.done{opacity:.65;background:#f1f5f3}.check{width:24px;height:24px}.badge{display:inline-flex;border-radius:99px;padding:5px 9px;background:#eef1f6;color:#344054;font-size:12px;font-weight:800}.badge.green{background:#e3f8ec;color:#16633f}.badge.red{background:#ffe8e8;color:#9b2323}.badge.gold{background:#fff3cd;color:#705100}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:10;padding:6px env(safe-area-inset-right) calc(6px + env(safe-area-inset-bottom)) env(safe-area-inset-left)}.nav button{background:transparent;color:#506070;border-radius:12px;padding:8px 2px;font-size:11px}.nav button.active{background:#e9f7ef;color:var(--brand)}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#eafff2,#f7fbff)}.loginbox{width:min(460px,100%);background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:22px}.logo{font-size:36px}.table{width:100%;border-collapse:collapse;overflow:hidden}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}.right{text-align:right!important}.hide{display:none!important}.small{font-size:12px}.dangerText{color:var(--danger)}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.form,.form2{grid-template-columns:1fr}.title h1{font-size:18px}.wrap{padding:10px}.card{border-radius:18px}.table{display:block;overflow:auto}.top{border-radius:0 0 18px 18px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DB_KEY='hsl_v1_free_local';
const users=[
 {u:'admin',p:'1234',role:'Admin',name:'Admin'}, {u:'ashok',p:'1234',role:'Ashok',name:'Ashok'},
 {u:'phionah',p:'1234',role:'Cook',name:'Phionah'}, {u:'vendor',p:'1234',role:'Vendor',name:'Nakasero Vendor'},
 {u:'family1',p:'1234',role:'Family',name:'Family A'}, {u:'family2',p:'1234',role:'Family',name:'Family B'}, {u:'family3',p:'1234',role:'Family',name:'Family C'}
];
const cats=['Vegetables','Fruits','Flour & Grains','Pulses & Beans','Dairy','Spices','Oils','Household','Snacks','Tea & Beverages','Other'];
const units=['Kg','Gm','Ltr','Ml','Pcs','Dozen','Packet','Box','Bag','Sack','Bundle','Bunch','Tray','Carton','Roll','Bottle','Tin','Jar'];
const master=[['Tomato','Vegetables','Kg'],['Onion','Vegetables','Kg'],['Potato','Vegetables','Kg'],['Cabbage','Vegetables','Pcs'],['Coriander','Vegetables','Bunch'],['Green Chilli','Vegetables','Kg'],['Banana','Fruits','Dozen'],['Apple','Fruits','Pcs'],['Watermelon','Fruits','Pcs'],['Rice','Flour & Grains','Kg'],['Wheat Flour','Flour & Grains','Kg'],['Maize Flour','Flour & Grains','Kg'],['Red Kidney Beans','Pulses & Beans','Kg'],['Green Gram','Pulses & Beans','Kg'],['Chickpeas','Pulses & Beans','Kg'],['Milk','Dairy','Ltr'],['Yogurt','Dairy','Ltr'],['Ghee','Dairy','Tin'],['Sugar','Other','Kg'],['Salt','Other','Kg'],['Tea Leaves','Tea & Beverages','Packet'],['Cooking Oil','Oils','Ltr'],['Turmeric','Spices','Packet'],['Cumin','Spices','Packet'],['Dish Soap','Household','Bottle'],['Laundry Powder','Household','Kg'],['Tissue Paper','Household','Roll'],['Sabudana','Flour & Grains','Kg'],['Rajgira Flour','Flour & Grains','Kg'],['Sama Rice','Flour & Grains','Kg'],['Peanuts','Pulses & Beans','Kg'],['Rock Salt','Spices','Packet']];
let session=JSON.parse(localStorage.getItem('hsl_session')||'null');
let tab='home';
function seed(){return{requests:[],bills:[],cash:[],logs:[],settings:{cycleDays:14,shoppingDay:'Sunday',reimburseDay:'Saturday',ekadashiName:'Next Swaminarayan Ekadashi',ekadashiDate:''}}}
function db(){let d=JSON.parse(localStorage.getItem(DB_KEY)||'null'); if(!d){d=seed(); save(d)} return d}
function save(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
function log(action){let d=db();d.logs.unshift({id:Date.now(),at:new Date().toLocaleString(),user:session?.name||'System',action});save(d)}
function money(n){return 'UGX '+Number(n||0).toLocaleString()}
function el(id){return document.getElementById(id)}
function render(){if(!session)return login(); shell()}
function login(){document.body.innerHTML='<div id="app"></div>';app.innerHTML=`<div class="login"><div class="loginbox"><div class="logo">🛒</div><h1>House Shopping List</h1><p class="muted">Requests • Shopping • Bills • Payments</p><input id="lu" placeholder="Username" value="ashok"><br><br><input id="lp" placeholder="Password" type="password" value="1234"><br><br><button style="width:100%" onclick="doLogin()">Login</button><p class="muted small">Demo logins: admin, ashok, phionah, vendor, family1, family2, family3<br>Password: 1234</p></div></div>`}
function doLogin(){let u=users.find(x=>x.u==lu.value.trim().toLowerCase()&&x.p==lp.value); if(!u)return alert('Wrong login'); session=u; localStorage.setItem('hsl_session',JSON.stringify(u)); log('logged in'); render()}
function logout(){localStorage.removeItem('hsl_session'); session=null; render()}
function shell(){document.body.innerHTML='<div id="app"></div>'; let d=db(); app.innerHTML=`<div class="top"><div class="title"><div><h1>🛒 House Shopping List</h1><div class="tag">${session.name} • ${session.role}</div></div><button class="secondary" onclick="logout()">Logout</button></div></div><div class="wrap" id="main"></div><div class="nav">${['home','request','shopping','bills','logs'].map(x=>`<button class="${tab==x?'active':''}" onclick="tab='${x}';shell()">${navIcon(x)}<br>${x[0].toUpperCase()+x.slice(1)}</button>`).join('')}</div>`; draw()}
function navIcon(x){return{home:'🏠',request:'📝',shopping:'🛒',bills:'💰',logs:'📜'}[x]}
function draw(){({home:home,request:req,shopping:shop,bills:bills,logs:logs}[tab])()}
function home(){let d=db(), req=d.requests, bills=d.bills, total=bills.reduce((a,b)=>a+b.total,0), paid=bills.filter(b=>b.paid).reduce((a,b)=>a+b.total,0); let cashIn=d.cash.filter(x=>x.type!='Spent').reduce((a,b)=>a+Number(b.amount),0), spent=d.cash.filter(x=>x.type=='Spent').reduce((a,b)=>a+Number(b.amount),0); main.innerHTML=`<div class="grid"><div class="stat"><span>Open Requests</span><br><b>${req.filter(x=>!x.purchased).length}</b></div><div class="stat"><span>Shopping Done</span><br><b>${req.length?Math.round(req.filter(x=>x.purchased).length/req.length*100):0}%</b></div><div class="stat"><span>Unpaid Bills</span><br><b>${money(total-paid)}</b></div><div class="stat"><span>Cash Balance</span><br><b>${money(cashIn-spent)}</b></div></div>${ekadashiCard()}${cycleCard()}<div class="card"><h3>Quick Actions</h3><div class="row"><button onclick="tab='request';shell()">Add Request</button><button class="secondary" onclick="tab='shopping';shell()">Open Shopping List</button><button class="gold" onclick="addEkadashiTemplate()">Add Ekadashi Items</button></div></div>`}
function ekadashiCard(){let d=db().settings; return `<div class="card"><div class="between"><div><h3>🔔 Swaminarayan Ekadashi Reminder</h3><div class="muted">Saturday & Sunday alert for Ashok planning.</div></div><span class="badge gold">Vegetarian</span></div><p><b>${d.ekadashiName}</b><br>Date: ${d.ekadashiDate||'Set date in Settings later'}</p>${session.role=='Admin'||session.role=='Ashok'?`<div class="form2"><input id="ekn" placeholder="Ekadashi name" value="${d.ekadashiName}"><input id="ekd" type="date" value="${d.ekadashiDate}"><button onclick="saveEk()">Save</button></div>`:''}</div>`}
function cycleCard(){return `<div class="card"><h3>📅 2-Week Shopping Cycle</h3><p><b>Shopping:</b> Every 2nd Sunday<br><b>Reimbursement + Next Advance:</b> Following Saturday</p><div class="muted">Use requests before shopping day. Ashok ticks purchased items and then records reimbursement/advance in Cash Book.</div></div>`}
function req(){let can=session.role!='Vendor'; let source=session.role=='Cook'?'Common Kitchen':session.role=='Family'?session.name:'Common Kitchen'; main.innerHTML=`${can?`<div class="card"><h3>Add Vegetarian Request</h3><div class="form"><input list="items" id="item" placeholder="Item name"><select id="cat">${cats.map(c=>`<option>${c}</option>`).join('')}</select><input id="qty" type="number" placeholder="Qty"><select id="unit">${units.map(u=>`<option>${u}</option>`).join('')}</select></div><br><div class="form2"><select id="src"><option>${source}</option><option>Common Kitchen</option><option>Family A</option><option>Family B</option><option>Family C</option></select><select id="urgent"><option value="No">Normal</option><option value="Yes">Urgent</option></select><button onclick="addReq()">Submit Request</button></div><datalist id="items">${master.map(m=>`<option value="${m[0]}">`).join('')}</datalist></div>`:''}<div class="card"><h3>Requests</h3><div class="tabs">${['All',...cats].map(c=>`<button class="tab" onclick="filterCat='${c}';req()">${c}</button>`).join('')}</div><div class="list">${listReq(false)}</div></div>`}
let filterCat='All';
function addReq(){let name=item.value.trim(); if(!name||!qty.value)return alert('Enter item and quantity'); let d=db(); d.requests.unshift({id:Date.now(),item:name,cat:cat.value,qty:Number(qty.value),unit:unit.value,source:src.value,urgent:urgent.value=='Yes',purchased:false,unavailable:false,createdBy:session.name,at:new Date().toLocaleString()}); save(d); log(`added request: ${name} ${qty.value} ${unit.value} for ${src.value}`); req()}
function listReq(shopping){let d=db(); let r=d.requests.filter(x=>filterCat=='All'||x.cat==filterCat); if(session.role=='Family') r=r.filter(x=>x.source==session.name); if(session.role=='Vendor') r=r.filter(x=>x.cat=='Vegetables'||x.cat=='Fruits'); if(!r.length)return '<p class="muted">No items yet.</p>'; return r.map(x=>`<div class="item ${x.purchased?'done':''}"><div class="between"><div><b>${x.urgent?'🚨 ':''}${x.item}</b> <span class="badge">${x.qty} ${x.unit}</span><br><span class="muted">${x.cat} • ${x.source} • by ${x.createdBy}</span></div>${shopping&&session.role!='Vendor'?`<input class="check" type="checkbox" ${x.purchased?'checked':''} onchange="toggleBuy(${x.id},this.checked)">`:''}</div>${shopping&&session.role!='Vendor'?`<div class="row" style="margin-top:8px"><button class="secondary" onclick="markUnavailable(${x.id})">Not Available</button><button class="secondary" onclick="removeReq(${x.id})">Delete</button></div>`:''}</div>`).join('')}
function shop(){main.innerHTML=`<div class="card"><div class="between"><h3>Shopping Checklist</h3><span class="badge green">${db().requests.filter(x=>x.purchased).length}/${db().requests.length}</span></div><div class="tabs">${['All',...cats].map(c=>`<button class="tab" onclick="filterCat='${c}';shop()">${c}</button>`).join('')}</div><div class="list">${listReq(true)}</div></div>${session.role=='Vendor'?vendorPortal():''}`}
function toggleBuy(id,v){let d=db(), x=d.requests.find(r=>r.id==id); x.purchased=v; save(d); log(`${v?'purchased':'unchecked'} ${x.item}`); shop()}
function markUnavailable(id){let d=db(),x=d.requests.find(r=>r.id==id); x.unavailable=true; save(d); log(`marked not available: ${x.item}`); alert('Marked Not Available')}
function removeReq(id){let d=db(); let x=d.requests.find(r=>r.id==id); d.requests=d.requests.filter(r=>r.id!=id); save(d); log(`deleted request: ${x?.item}`); shop()}
function vendorPortal(){let veg=db().requests.filter(x=>['Vegetables','Fruits'].includes(x.cat));return `<div class="card"><h3>Vendor Bill Entry</h3><p class="muted">Enter rates for vegetables/fruits supplied.</p><table class="table"><tr><th>Item</th><th>Qty</th><th>Rate</th></tr>${veg.map(x=>`<tr><td>${x.item}</td><td>${x.qty} ${x.unit}</td><td><input id="rate_${x.id}" type="number" placeholder="UGX"></td></tr>`).join('')}</table><br><button onclick="makeBill()">Generate Vendor Bill</button></div>`}
function makeBill(){let d=db(); let items=d.requests.filter(x=>['Vegetables','Fruits'].includes(x.cat)).map(x=>({item:x.item,qty:x.qty,unit:x.unit,rate:Number((el('rate_'+x.id)||{}).value||0)})).filter(x=>x.rate>0); if(!items.length)return alert('Enter at least one rate'); let total=items.reduce((a,b)=>a+b.qty*b.rate,0); d.bills.unshift({id:Date.now(),vendor:session.name,items,total,paid:false,at:new Date().toLocaleString()}); save(d); log(`vendor submitted bill ${money(total)}`); tab='bills'; shell()}
function bills(){let d=db(); main.innerHTML=`<div class="card"><h3>Bills & Payments</h3>${d.bills.map(b=>`<div class="item"><div class="between"><div><b>${b.vendor}</b><br><span class="muted">${b.at}</span></div><span class="badge ${b.paid?'green':'gold'}">${b.paid?'Paid':'Pending'}</span></div><table class="table"><tr><th>Item</th><th>Qty</th><th>Rate</th><th class="right">Amount</th></tr>${b.items.map(i=>`<tr><td>${i.item}</td><td>${i.qty} ${i.unit}</td><td>${money(i.rate)}</td><td class="right">${money(i.qty*i.rate)}</td></tr>`).join('')}<tr><th colspan="3">Total</th><th class="right">${money(b.total)}</th></tr></table>${!b.paid&&session.role!='Vendor'?`<br><button onclick="payBill(${b.id})">Mark Paid</button>`:''}</div>`).join('')||'<p class="muted">No bills yet.</p>'}</div>${cashBook()}`}
function payBill(id){let d=db(), b=d.bills.find(x=>x.id==id); b.paid=true; d.cash.unshift({id:Date.now(),type:'Spent',source:b.vendor,amount:b.total,remarks:'Bill paid',at:new Date().toLocaleString()}); save(d); log(`marked bill paid: ${money(b.total)}`); bills()}
function cashBook(){if(!['Admin','Ashok'].includes(session.role))return '';let d=db();return `<div class="card"><h3>Cash Book</h3><div class="form2"><select id="ctype"><option>Advance</option><option>Reimbursement</option><option>Spent</option></select><input id="camt" type="number" placeholder="Amount UGX"><input id="crem" placeholder="Remarks / source"></div><br><button onclick="addCash()">Add Cash Entry</button><table class="table"><tr><th>Date</th><th>Type</th><th>Source/Remarks</th><th class="right">Amount</th></tr>${d.cash.map(c=>`<tr><td>${c.at}</td><td>${c.type}</td><td>${c.source||c.remarks}</td><td class="right">${money(c.amount)}</td></tr>`).join('')}</table></div>`}
function addCash(){let d=db(); d.cash.unshift({id:Date.now(),type:ctype.value,source:crem.value||'Company Cashier',amount:Number(camt.value||0),remarks:crem.value,at:new Date().toLocaleString()}); save(d); log(`cash entry ${ctype.value}: ${money(camt.value)}`); bills()}
function logs(){let d=db(); main.innerHTML=`<div class="card"><h3>Activity Logs</h3>${d.logs.map(l=>`<div class="item"><b>${l.user}</b> <span class="muted">${l.at}</span><br>${l.action}</div>`).join('')||'<p class="muted">No logs yet.</p>'}</div>`}
function saveEk(){let d=db();d.settings.ekadashiName=ekn.value;d.settings.ekadashiDate=ekd.value;save(d);log('updated Ekadashi reminder');home()}
function addEkadashiTemplate(){let d=db();[['Sabudana',2,'Kg'],['Potato',10,'Kg'],['Sweet Potato',5,'Kg'],['Rajgira Flour',2,'Kg'],['Sama Rice',2,'Kg'],['Peanuts',3,'Kg'],['Banana',3,'Dozen'],['Milk',10,'Ltr'],['Yogurt',5,'Ltr'],['Rock Salt',2,'Packet']].forEach(a=>d.requests.unshift({id:Date.now()+Math.random(),item:a[0],cat:master.find(m=>m[0]==a[0])?.[1]||'Other',qty:a[1],unit:a[2],source:'Common Kitchen',urgent:false,purchased:false,createdBy:session.name,at:new Date().toLocaleString()}));save(d);log('added Ekadashi fasting grocery template');tab='request';shell()}
render();
</script>
</body>
</html>
